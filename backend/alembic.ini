# File: alembic.ini

[alembic]
script_location = alembic

# Database URL is injected from app.config.settings.DATABASE_URL in alembic/env.py
sqlalchemy.url =

# Optional file naming template
# file_template = %%(rev)s_%%(slug)s

# Timezone used for rendering migration dates
# timezone =

# Max length of generated slug
truncate_slug_length = 40

# Revision environment
revision_environment = false

# Sourceless mode
sourceless = false

# Version locations
# version_locations = %(here)s/alembic/versions

# Path separator
path_separator = os

# Recursive version locations
recursive_version_locations = false

# Output encoding
output_encoding = utf-8


[post_write_hooks]
# post_write_hooks are disabled


[loggers]
keys = root,sqlalchemy,alembic


[handlers]
keys = console


[formatters]
keys = generic


[logger_root]
level = WARNING
handlers = console
qualname =


[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine


[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S