# File: alembic.ini
[alembic]
script_location = alembic

# URL thật được gán trong alembic/env.py từ settings.DATABASE_URL
sqlalchemy.url =

# Template tên file migration có thể điều chỉnh khi cần
# file_template = %%(rev)s_%%(slug)s

# Giới hạn độ dài phần slug trong tên file migration
truncate_slug_length = 40

# Thời gian định dạng trong migration
#timezone =

# Bật nếu muốn version path phân tách bằng os.pathsep
version_path_separator = os

# Mặc định folder versions nằm dưới alembic/
# version_locations = %(here)s/alembic/versions

[post_write_hooks]
# Có thể cấu hình formatter/linter sau khi sinh migration nếu cần

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
